name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # 例如: v1.0.0, v1.2.3
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-11-arm' || 'windows-latest' }}
    strategy:
      matrix:
        arch: [amd64]
        mode: [portable, installer]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Setup Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        if: matrix.mode == 'installer'
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Get version from tag
        id: get_version
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          $COMMIT = "${{ github.sha }}".Substring(0,7)
          echo "COMMIT=$COMMIT" >> $env:GITHUB_OUTPUT
          $BUILD_TIME = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          echo "BUILD_TIME=$BUILD_TIME" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build Portable Version
        if: matrix.mode == 'portable'
        run: |
          $LDFLAGS = "-s -w -X 'lunabox/internal/version.Version=${{ steps.get_version.outputs.VERSION }}' -X 'lunabox/internal/version.GitCommit=${{ steps.get_version.outputs.COMMIT }}' -X 'lunabox/internal/version.BuildTime=${{ steps.get_version.outputs.BUILD_TIME }}' -X 'lunabox/internal/version.BuildMode=portable' -X 'lunabox/internal/version.BangumiOAuthClientID=$env:LUNABOX_BANGUMI_CLIENT_ID' -X 'lunabox/internal/version.BangumiOAuthClientSecret=$env:LUNABOX_BANGUMI_CLIENT_SECRET'"
          # Build GUI
          wails build -platform windows/${{ matrix.arch }} -ldflags "$LDFLAGS" -o LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-portable.exe
          
          # Build CLI
          go build -trimpath -ldflags "$LDFLAGS" -o build/bin/lunacli.exe ./cmd/lunacli
        shell: pwsh
        env:
          LUNABOX_BANGUMI_CLIENT_ID: ${{ vars.LUNABOX_BANGUMI_CLIENT_ID }}
          LUNABOX_BANGUMI_CLIENT_SECRET: ${{ secrets.LUNABOX_BANGUMI_CLIENT_SECRET }}

      - name: Build Installer Version
        if: matrix.mode == 'installer'
        run: |
          $LDFLAGS = "-s -w -X 'lunabox/internal/version.Version=${{ steps.get_version.outputs.VERSION }}' -X 'lunabox/internal/version.GitCommit=${{ steps.get_version.outputs.COMMIT }}' -X 'lunabox/internal/version.BuildTime=${{ steps.get_version.outputs.BUILD_TIME }}' -X 'lunabox/internal/version.BuildMode=installer' -X 'lunabox/internal/version.BangumiOAuthClientID=$env:LUNABOX_BANGUMI_CLIENT_ID' -X 'lunabox/internal/version.BangumiOAuthClientSecret=$env:LUNABOX_BANGUMI_CLIENT_SECRET'"
          
          # Build CLI first (needed for installer)
          go build -trimpath -ldflags "$LDFLAGS" -o build/bin/lunacli.exe ./cmd/lunacli
          
          # Build GUI with NSIS
          wails build -platform windows/${{ matrix.arch }} -ldflags "$LDFLAGS" -nsis
        shell: pwsh
        env:
          LUNABOX_BANGUMI_CLIENT_ID: ${{ vars.LUNABOX_BANGUMI_CLIENT_ID }}
          LUNABOX_BANGUMI_CLIENT_SECRET: ${{ secrets.LUNABOX_BANGUMI_CLIENT_SECRET }}

      - name: Create portable ZIP
        if: matrix.mode == 'portable'
        run: |
          $PKG_NAME = "LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-portable"
          $PKG_DIR = "build/bin/$PKG_NAME"
          New-Item -ItemType Directory -Force -Path "$PKG_DIR"
          New-Item -ItemType Directory -Force -Path "$PKG_DIR/backups"
          New-Item -ItemType Directory -Force -Path "$PKG_DIR/covers"
          
          Copy-Item "build/bin/$PKG_NAME.exe" -Destination "$PKG_DIR/LunaBox.exe"
          Copy-Item "build/bin/lunacli.exe" -Destination "$PKG_DIR/lunacli.exe"
          
          Compress-Archive -Path "$PKG_DIR" -DestinationPath "$PKG_NAME.zip"
        shell: pwsh

      - name: Rename installer
        if: matrix.mode == 'installer'
        run: |
          Write-Host "Files in build/bin:"
          Get-ChildItem -Path "build/bin" -Filter "*.exe" -Recurse
          
          if (Test-Path "build/bin/lunabox-${{ matrix.arch }}-installer.exe") {
            Move-Item -Path "build/bin/lunabox-${{ matrix.arch }}-installer.exe" -Destination "LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-setup.exe"
          } elseif (Test-Path "build/bin/LunaBox-${{ matrix.arch }}-installer.exe") {
            Move-Item -Path "build/bin/LunaBox-${{ matrix.arch }}-installer.exe" -Destination "LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-setup.exe"
          } else {
            Write-Host "Warning: Installer not found for ${{ matrix.arch }}"
          }
        shell: pwsh

      - name: Upload Portable Artifact
        if: matrix.mode == 'portable'
        uses: actions/upload-artifact@v4
        with:
          name: lunabox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-portable
          path: LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-portable.zip

      - name: Upload Installer Artifact
        if: matrix.mode == 'installer'
        uses: actions/upload-artifact@v4
        with:
          name: lunabox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-installer
          path: LunaBox-${{ steps.get_version.outputs.VERSION }}-windows-${{ matrix.arch }}-setup.exe

  create-release:
    name: Create GitHub Release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find ./artifacts -type f \( -name "*.zip" -o -name "*.exe" \) -exec cp {} ./release/ \;
          ls -lh ./release

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          # 检查是否存在 CHANGELOG.md
          if [ -f "CHANGELOG.md" ]; then
            # 提取当前版本的 changelog
            # 命中 ## VERSION / ## vVERSION 后，输出到下一个二级标题前为止
            awk -v version="$VERSION" '
              function normalize_heading(line, heading) {
                heading = line
                sub(/^##[[:space:]]+/, "", heading)
                sub(/^v/, "", heading)
                sub(/[[:space:]]+$/, "", heading)
                return heading
              }

              /^##[[:space:]]+/ {
                current = normalize_heading($0)
                if (found && current != version) {
                  exit
                }
                if (current == version) {
                  found = 1
                }
              }

              found {
                print
              }
            ' CHANGELOG.md > release_notes.md

            # 如果没有找到对应版本的内容，文件会是空的
            if [ ! -s release_notes.md ]; then
              echo "未找到版本 ${VERSION} 的 changelog，使用默认模板"
              rm -f release_notes.md
            fi
          fi

          # 如果没有从 CHANGELOG.md 提取到内容，使用默认模板
          if [ ! -f "release_notes.md" ]; then
            cat << EOF > release_notes.md
          ## LunaBox ${{ steps.get_version.outputs.VERSION }}

          ### 📝 更新内容

          请查看 [Commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          EOF
          fi

          # 添加下载说明
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 下载说明" >> release_notes.md
          echo "" >> release_notes.md
          echo "| 文件 | 说明 |" >> release_notes.md
          echo "|------|------|" >> release_notes.md
          echo "| \`*-portable.zip\` | 便携版，解压即用，数据存储在程序目录 |" >> release_notes.md
          echo "| \`*-setup.exe\` | 安装版，标准安装程序，数据存储在 %APPDATA%\\\\LunaBox |" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🔗 相关链接" >> release_notes.md
          echo "" >> release_notes.md
          echo "- [查看所有提交](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})" >> release_notes.md
          echo "- [版本对比](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref_name }})" >> release_notes.md

          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
